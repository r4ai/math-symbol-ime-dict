[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "math-symbol-ime-dict"
version = "0.1.0"
description = "Generate mathematical-symbol user dictionaries for Microsoft IME, Google Japanese Input, and azooKey."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Generated by ChatGPT" }]
dependencies = []

[project.scripts]
math-symbol-ime-dict = "math_symbol_ime_dict.cli:main"
msym-ime = "math_symbol_ime_dict.cli:main"

[dependency-groups]
dev = [
    "ruff",
    "ty",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests", "scripts"]

[tool.ruff.lint]
select = [
    "A",
    "ARG",
    "B",
    "BLE",
    "C4",
    "E",
    "F",
    "I",
    "N",
    "PL",
    "PTH",
    "RUF",
    "SIM",
    "UP",
    "W",
]
ignore = [
    "PLR2004",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ty.environment]
python-version = "3.12"
root = ["src", "."]

[tool.ty.rules]
unresolved-import = "error"

[tool.hatch.build.targets.wheel]
packages = ["src/math_symbol_ime_dict"]
